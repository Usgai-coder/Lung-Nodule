name: lung_nodule
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  # 核心环境
  - python=3.9
  - pip
  
  # PyTorch 与 CUDA 支持 (根据你的显卡配置，如果不带显卡可将 pytorch-cuda 移除)
  - pytorch==2.1.0
  - torchvision==0.16.0
  - pytorch-cuda=11.8 
  
  # 科学计算基础包通过 conda 安装，提升底层 C/C++ 库的兼容性
  - numpy=1.26.0
  - pandas=2.1.1
  - scikit-learn=1.3.1
  - scipy=1.11.3
  - matplotlib=3.8.0
  - seaborn=0.13.0
  
  # 其余医疗专用与高频迭代包通过 pip 安装
  - pip:
    - pytorch-lightning==2.1.0
    - tensorboard==2.14.0
    - SimpleITK==2.3.1
    - pydicom==2.4.3
    - scikit-image==0.22.0
    - PyYAML==6.0.1